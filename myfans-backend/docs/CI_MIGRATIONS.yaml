# GitHub Actions CI/CD Configuration for Database Migrations
# Add this to .github/workflows/database.yml

name: Database Migrations CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'myfans-backend/migrations/**'
      - 'myfans-backend/src/database/**'
      - 'myfans-backend/test/migrations/**'
      - 'myfans-backend/test/seed/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'myfans-backend/migrations/**'
      - 'myfans-backend/src/database/**'
      - 'myfans-backend/test/migrations/**'
      - 'myfans-backend/test/seed/**'

jobs:
  database-migrations:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: myfans
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: myfans_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'myfans-backend/package-lock.json'

      - name: Install dependencies
        working-directory: ./myfans-backend
        run: npm ci

      - name: Verify migrations structure
        working-directory: ./myfans-backend
        run: |
          echo "Checking migration files..."
          ls -la migrations/
          
          # Verify up/down pairs exist
          for file in migrations/*.up.sql; do
            base=$(basename "$file" .up.sql)
            if [ ! -f "migrations/${base}.down.sql" ]; then
              echo "ERROR: Missing down migration for $base"
              exit 1
            fi
          done
          echo "✓ All migration pairs verified"

      - name: Create test database
        working-directory: ./myfans-backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: myfans
          DB_PASSWORD: test_password
          DB_NAME: myfans_test
        run: |
          npm run db:migrate:up

      - name: Run migration tests
        working-directory: ./myfans-backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: myfans
          DB_PASSWORD: test_password
          DB_NAME: myfans_test
        run: |
          npm run test:migrations

      - name: Run seed and query tests
        working-directory: ./myfans-backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: myfans
          DB_PASSWORD: test_password
          DB_NAME: myfans_test
        run: |
          npm run test:seed

      - name: Verify rollback
        working-directory: ./myfans-backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: myfans
          DB_PASSWORD: test_password
          DB_NAME: myfans_test
        run: |
          echo "Testing rollback..."
          npm run db:migrate:down
          
          # Verify all tables are gone
          tables=$(psql -h localhost -U myfans -d myfans_test -t -c \
            "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='public' AND table_type='BASE TABLE'")
          if [ "$tables" -ne 0 ]; then
            echo "ERROR: Tables still exist after rollback"
            exit 1
          fi
          echo "✓ Rollback successful"

      - name: Re-apply migrations and verify
        working-directory: ./myfans-backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: myfans
          DB_PASSWORD: test_password
          DB_NAME: myfans_test
        run: |
          echo "Re-applying migrations..."
          npm run db:migrate:up
          npm run test:seed

      - name: Generate migration report
        working-directory: ./myfans-backend
        if: always()
        run: |
          echo "Migration Status Report" > migration-report.txt
          echo "======================" >> migration-report.txt
          ls -lh migrations/ >> migration-report.txt
          echo "" >> migration-report.txt
          echo "Test Results:" >> migration-report.txt
          npm run test:db 2>&1 | tail -20 >> migration-report.txt || true

      - name: Upload migration report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-report
          path: myfans-backend/migration-report.txt

  schema-documentation:
    runs-on: ubuntu-latest
    needs: database-migrations
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate schema documentation
        run: |
          echo "# MyFans Database Schema" > schema-doc.md
          echo "" >> schema-doc.md
          echo "Generated: $(date)" >> schema-doc.md
          echo "" >> schema-doc.md
          echo "## Tables" >> schema-doc.md
          cat myfans-backend/migrations/*.up.sql | grep "CREATE TABLE" >> schema-doc.md || true

      - name: Upload schema documentation
        uses: actions/upload-artifact@v4
        with:
          name: schema-documentation
          path: schema-doc.md
