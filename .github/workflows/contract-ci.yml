name: Contract CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  contract:
    name: contract
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all --check --manifest-path Cargo.toml
        working-directory: contract

      - name: Run clippy
        run: cargo clippy --all-targets --all-features --manifest-path Cargo.toml -- -D warnings
        working-directory: contract

      - name: Run tests
        run: cargo test --all-features --manifest-path Cargo.toml
        working-directory: contract

      - name: Build wasm target
        run: cargo build --release --target wasm32-unknown-unknown --manifest-path Cargo.toml
        working-directory: contract
