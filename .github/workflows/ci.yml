name: CI

on:
  push:
    branches: [main, master, feat/dependency-audit-ci, "ci/**"]
  pull_request:
    branches: [main, master, feat/dependency-audit-ci]

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Security audit (dependencies)
        run: npm audit --omit=dev --audit-level=high
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi
        working-directory: backend

      - name: Security audit (dependencies)
        run: npm audit --omit=dev --audit-level=high
        working-directory: backend

      - name: Build
        run: npm run build
        working-directory: backend

      - name: Run unit tests
        run: npm test
        working-directory: backend
        env:
          JWT_SECRET: ci-test-secret
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: myfans

      - name: Validate OpenAPI schema generation
        run: npm run generate:openapi
        working-directory: backend
        env:
          JWT_SECRET: ci-test-secret
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: myfans
          SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
          STELLAR_NETWORK: testnet
          WEBHOOK_SECRET: ci-test-secret

      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: backend
        env:
          JWT_SECRET: ci-test-secret
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: myfans

  # Single audit job (not duplicated across the toolchain matrix) to save CI time.
  contracts-audit:
    name: Contracts (RustSec audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,wasm32v1-none

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contract
          prefix-key: contracts-audit

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Security audit (contracts)
        # Fail on high/critical RustSec advisories as configured in contract/audit.toml.
        run: cargo audit
        working-directory: contract

  contracts:
    name: Contracts (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,wasm32v1-none

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contract
          prefix-key: contracts

      - name: Build (wasm release, workspace)
        run: cargo build --workspace --target wasm32-unknown-unknown --release
        working-directory: contract

      - name: Run tests (workspace)
        run: cargo test --workspace
        working-directory: contract
