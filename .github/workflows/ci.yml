name: CI

on:
  push:
    branches: [main, master, feat/dependency-audit-ci]
  pull_request:
    branches: [main, master, feat/dependency-audit-ci]

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund
        working-directory: frontend

      - name: Security audit (dependencies)
        run: npm audit --omit=dev --audit-level=high
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi
        working-directory: backend

      - name: Security audit (dependencies)
        run: npm audit --omit=dev --audit-level=high
        working-directory: backend

      - name: Build
        run: npm run build
        working-directory: backend

      - name: Run unit tests
        run: npm test
        working-directory: backend

      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: backend

  contracts:
    name: Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (for stellar-cli)
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev libudev-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown,wasm32v1-none

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contract

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Security audit (contracts)
        # Fail on high/critical RustSec advisories as configured in contract/audit.toml.
        run: cargo audit
        working-directory: contract

      - name: Build
        run: cargo build --target wasm32-unknown-unknown --release
        working-directory: contract

      - name: Run tests
        run: cargo test
        working-directory: contract

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli

      - name: Deploy and verify on Futurenet
        run: |
          ./scripts/deploy.sh \
            --network futurenet \
            --source "ci-deployer-${{ github.run_id }}-${{ github.run_attempt }}" \
            --out ./deployed-ci.json \
            --env-out ./.env.deployed-ci
        working-directory: contract
