name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Build
        run: npm run build
        working-directory: backend

      - name: Run unit tests
        run: npm test
        working-directory: backend
        env:
          NODE_ENV: test

      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: backend
        env:
          NODE_ENV: test

  contracts:
    name: Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contract

      - name: Build
        run: cargo build --target wasm32-unknown-unknown --release
        working-directory: contract

      - name: Run tests
        run: cargo test
        working-directory: contract

      - name: Write contract IDs artifact
        run: |
          echo '{"myfans":"'"${CONTRACT_ID_MYFANS:-}"'","myfansToken":"'"${CONTRACT_ID_MYFANS_TOKEN:-}"'"}' > contract/contract-ids.json
        env:
          CONTRACT_ID_MYFANS: ${{ vars.CONTRACT_ID_MYFANS }}
          CONTRACT_ID_MYFANS_TOKEN: ${{ vars.CONTRACT_ID_MYFANS_TOKEN }}

      - name: Upload contract IDs artifact
        uses: actions/upload-artifact@v4
        with:
          name: contract-ids
          path: contract/contract-ids.json
          retention-days: 1

  contract-health:
    name: Contract Health Checks
    runs-on: ubuntu-latest
    needs: [contracts, backend]
    if: ${{ vars.CONTRACT_ID_MYFANS != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Download contract IDs artifact
        uses: actions/download-artifact@v4
        with:
          name: contract-ids
          path: contract

      - name: Run contract health checks
        run: npx ts-node scripts/check-contracts.ts
        working-directory: backend
        timeout-minutes: 2
        env:
          SOROBAN_RPC_URL: ${{ vars.SOROBAN_RPC_URL || 'https://soroban-testnet.stellar.org' }}
          CONTRACT_IDS_PATH: ../contract/contract-ids.json
